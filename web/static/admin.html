<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>管理员 · 自然语言生图</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  #lb-root { position: fixed; inset: 0; z-index: 60; background: #000; display: none; flex-direction: column; }
  #lb-root.open { display: flex; }
  #lb-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 8px; min-height: 0; }
  #lb-img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; user-select: auto; -webkit-user-select: auto; -webkit-touch-callout: default; }
  #lb-bar { color: #fff; padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,.5); }
  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.4); color: #fff; border: 0; width: 44px; height: 64px; font-size: 28px; cursor: pointer; }
  .lb-nav:hover { background: rgba(0,0,0,.7); }
  #lb-prev { left: 8px; }
  #lb-next { right: 8px; }
  #lb-close { position: absolute; top: 8px; right: 12px; background: transparent; color: #fff; border: 0; font-size: 28px; cursor: pointer; z-index: 1; }
  #lb-title { color: #ddd; font-size: 12px; margin-right: auto; word-break: break-all; }
</style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- 灯箱 -->
<div id="lb-root" role="dialog" aria-modal="true">
  <button id="lb-close" title="关闭 (Esc)">×</button>
  <button id="lb-prev" class="lb-nav" title="上一张 (←)">‹</button>
  <button id="lb-next" class="lb-nav" title="下一张 (→)">›</button>
  <div id="lb-img-wrap"><img id="lb-img" alt="" /></div>
  <div id="lb-bar">
    <span id="lb-title"></span>
    <span id="lb-time" class="text-xs text-gray-300"></span>
    <span id="lb-creator" class="text-xs text-amber-300"></span>
    <a id="lb-download" href="#" target="_blank" rel="noopener" download
       class="text-xs px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">⬇ 下载原图</a>
  </div>
</div>

<div class="max-w-6xl mx-auto p-4">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold">🛡️ 管理员控制台</h1>
    <a href="/" class="text-sm text-blue-600 hover:underline">← 返回首页</a>
  </div>

  <!-- 维护模式 -->
  <div class="bg-white rounded shadow p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-semibold cursor-pointer select-none" data-toggle="maint-body">
        <span class="inline-block w-4 text-gray-400" data-arrow="maint-body">▸</span>
        🛠️ 维护模式
        <span id="maint-state-badge" class="ml-2 text-xs px-2 py-0.5 rounded bg-gray-200 text-gray-700">未开启</span>
      </h2>
      <button id="btn-refresh-maint" class="text-sm px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">刷新</button>
    </div>
    <div id="maint-body" class="hidden">
    <p class="text-xs text-gray-500 mb-2">选择维护模式：「仅禁止生图」允许用户浏览看图但不可调用显卡生图；「完全维护」所有请求返回维护页/503。</p>
    <div class="flex flex-col gap-1 text-sm mb-2">
      <label class="flex items-center gap-2">
        <input type="radio" name="maint-mode" value="off" checked />
        <span>关闭</span>
      </label>
      <label class="flex items-center gap-2">
        <input type="radio" name="maint-mode" value="no_gen" />
        <span>🖼️ 仅禁止生图（允许浏览看图）</span>
      </label>
      <label class="flex items-center gap-2">
        <input type="radio" name="maint-mode" value="full" />
        <span>🛠️ 完全维护（全站 503）</span>
      </label>
    </div>
    <label class="block text-sm mb-1">维护页文字（支持换行）</label>
    <textarea id="maint-message" rows="3" class="w-full border rounded px-2 py-1 text-sm font-mono"
      placeholder="站点维护中，请稍后再试。"></textarea>
    <div class="mt-2 flex items-center gap-2">
      <button id="btn-save-maint" class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 text-sm">保存</button>
      <span id="maint-status" class="text-xs text-gray-500"></span>
    </div>
    </div>
  </div>

  <!-- 限流配置 -->
  <div class="bg-white rounded shadow p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-semibold cursor-pointer select-none" data-toggle="limits-body">
        <span class="inline-block w-4 text-gray-400" data-arrow="limits-body">▸</span>
        ⚙️ 限流配置
      </h2>
      <button id="btn-refresh-limits" class="text-sm px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">刷新</button>
    </div>
    <div id="limits-body" class="hidden">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
      <label class="flex flex-col gap-1">
        <span>生图冷却（秒/IP）</span>
        <input id="lim-gen-cd" type="number" min="0" step="1" class="border rounded px-2 py-1 font-mono" />
        <span class="text-[10px] text-gray-500">同一 IP 两次生图最少间隔。0 = 不限制。管理员豁免。</span>
      </label>
      <label class="flex flex-col gap-1">
        <span>图片限流窗口（秒）</span>
        <input id="lim-img-window" type="number" min="0" step="1" class="border rounded px-2 py-1 font-mono" />
        <span class="text-[10px] text-gray-500">滑动窗口长度。0 = 关闭限流。</span>
      </label>
      <label class="flex flex-col gap-1">
        <span>窗口内最大请求数</span>
        <input id="lim-img-max" type="number" min="0" step="1" class="border rounded px-2 py-1 font-mono" />
        <span class="text-[10px] text-gray-500">/api/output/file、/api/image、/api/thumbnail 三端点合计。</span>
      </label>
      <label class="flex flex-col gap-1">
        <span>举报窗口（秒）</span>
        <input id="lim-report-window" type="number" min="0" step="1" class="border rounded px-2 py-1 font-mono" />
        <span class="text-[10px] text-gray-500">同一 IP 在此时间内的举报次数受限。</span>
      </label>
      <label class="flex flex-col gap-1">
        <span>窗口内最大举报数</span>
        <input id="lim-report-max" type="number" min="1" step="1" class="border rounded px-2 py-1 font-mono" />
        <span class="text-[10px] text-gray-500">窗口内允许的最大举报次数。</span>
      </label>
      <label class="flex flex-col gap-1">
        <span>待处理举报上限</span>
        <input id="lim-report-pending" type="number" min="1" step="1" class="border rounded px-2 py-1 font-mono" />
        <span class="text-[10px] text-gray-500">单 IP 最多积压多少条待处理举报。</span>
      </label>
    </div>
    <div class="mt-3 flex items-center gap-2">
      <button id="btn-save-limits" class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 text-sm">保存</button>
      <span id="lim-status" class="text-xs text-gray-500"></span>
    </div>
    </div>
  </div>

  <!-- 封禁列表 -->
  <div class="bg-white rounded shadow p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-semibold cursor-pointer select-none" data-toggle="bans-body">
        <span class="inline-block w-4 text-gray-400" data-arrow="bans-body">▸</span>
        🚫 当前封禁的 IP
      </h2>
      <button id="btn-refresh-bans" class="text-sm px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">刷新</button>
    </div>
    <div id="bans-body" class="hidden">
    <div class="flex gap-2 mb-2">
      <input id="ban-input" type="text" placeholder="手动输入 IP 添加到封禁列表"
        class="flex-1 border rounded px-2 py-1 text-sm font-mono" />
      <button id="btn-add-ban" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 text-sm">封禁</button>
    </div>
    <div id="ban-list" class="text-sm">加载中...</div>
    <div id="ip-images-panel" class="hidden mt-3 border-t pt-3">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-sm font-semibold">📷 <span id="ip-images-title"></span> 的生图记录 (<span id="ip-images-count">0</span>)</h3>
        <div class="flex gap-2">
          <button id="btn-ip-select-all" class="text-xs px-2 py-1 bg-gray-200 rounded hover:bg-gray-300">全选</button>
          <button id="btn-ip-del-selected" class="text-xs px-2 py-1 bg-red-500 text-white rounded hover:bg-red-600 hidden">🗑 删除选中</button>
          <button id="btn-ip-images-close" class="text-xs px-2 py-1 bg-gray-200 rounded hover:bg-gray-300">关闭</button>
        </div>
      </div>
      <div id="ip-images-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2"></div>
    </div>
    </div>
  </div>

  <!-- 举报管理 -->
  <div class="bg-white rounded shadow p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-semibold cursor-pointer select-none" data-toggle="reports-body">
        <span class="inline-block w-4 text-gray-400" data-arrow="reports-body">▸</span>
        🚩 举报管理
        <span class="text-xs text-gray-500 font-normal">(<span id="reports-count">0</span> 待处理)</span>
      </h2>
      <button id="btn-refresh-reports" class="text-sm px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">刷新</button>
    </div>
    <div id="reports-body" class="hidden">
      <div id="reports-list" class="text-sm">加载中...</div>
    </div>
  </div>

  <!-- 精选 -->
  <div class="bg-white rounded shadow p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-semibold cursor-pointer select-none" data-toggle="featured-body">
        <span class="inline-block w-4 text-gray-400" data-arrow="featured-body">▸</span>
        ⭐ 精选展示
        <span class="text-xs text-gray-500 font-normal">(<span id="featured-count">0</span>) — 拖拽卡片可排序</span>
      </h2>
      <button id="btn-refresh-featured" class="text-sm px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">刷新</button>
    </div>
    <div id="featured-body" class="hidden">
      <div id="featured-list" class="text-sm">加载中...</div>
    </div>
  </div>

  <!-- 最近生图记录 -->
  <div class="bg-white rounded shadow p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-lg font-semibold cursor-pointer select-none" data-toggle="recent-body">
        <span class="inline-block w-4 text-gray-400" data-arrow="recent-body">▸</span>
        📋 生图记录
        <span class="text-xs text-gray-500 font-normal">(<span id="recent-shown">0</span>/<span id="recent-total">0</span>)</span>
      </h2>
      <button id="btn-refresh-recent" class="text-sm px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">刷新</button>
    </div>
    <div id="recent-body" class="hidden">
      <div id="recent-list" class="text-sm">加载中...</div>
      <div class="mt-3 text-center">
        <button id="btn-load-more-recent"
          class="hidden text-sm px-4 py-1 bg-blue-500 text-white rounded hover:bg-blue-600">加载更多</button>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const escHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function api(method, url, body) {
  const opt = { method, headers: {} };
  if (body) {
    opt.headers['Content-Type'] = 'application/json';
    opt.body = JSON.stringify(body);
  }
  const r = await fetch(url, opt);
  if (r.status === 401 || r.status === 403) {
    alert('被反向代理拦截：检查 Cloudflare Access / nginx 鉴权配置');
    throw new Error('blocked by proxy');
  }
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.detail || ('HTTP ' + r.status));
  return d;
}

async function loadBans() {
  $('ban-list').textContent = '加载中...';
  try {
    const d = await api('GET', '/api/admin/bans');
    const ips = d.banned || [];
    if (!ips.length) { $('ban-list').innerHTML = '<div class="text-gray-400">暂无</div>'; return; }
    $('ban-list').innerHTML = '<div class="flex flex-wrap gap-2">' +
      ips.map(ip => `<span class="inline-flex items-center gap-1 bg-red-100 text-red-800 rounded px-2 py-1 font-mono text-xs">
        <a href="#" data-ip="${escHtml(ip)}" class="btn-show-ip-imgs hover:underline cursor-pointer">${escHtml(ip)}</a>
        <button data-ip="${escHtml(ip)}" class="btn-unban hover:text-red-600 font-bold">×</button>
      </span>`).join('') + '</div>';
    document.querySelectorAll('.btn-unban').forEach(b => b.addEventListener('click', () => unban(b.dataset.ip)));
    document.querySelectorAll('.btn-show-ip-imgs').forEach(a => a.addEventListener('click', (e) => { e.preventDefault(); showIpImages(a.dataset.ip); }));
  } catch (e) { $('ban-list').textContent = '失败: ' + e.message; }
}

async function ban(ip) {
  if (!ip) return;
  await api('POST', '/api/admin/ban', { ip });
  $('ban-input').value = '';
  loadBans();
  loadRecent();
}

async function unban(ip) {
  await api('POST', '/api/admin/unban', { ip });
  loadBans();
  loadRecent();
}

let bannedSet = new Set();
async function refreshBannedSet() {
  try {
    const d = await api('GET', '/api/admin/bans');
    bannedSet = new Set(d.banned || []);
  } catch {}
}

const recentState = { loaded: 0, total: 0, pageSize: 60 };
let featuredSet = new Set();

function rowHTML(it) {
  const t = it.mtime ? new Date(it.mtime * 1000).toLocaleString('zh-CN') : '?';
  const isBanned = bannedSet.has(it.ip);
  const banBtn = isBanned
    ? `<span class="text-[10px] bg-gray-300 text-gray-700 rounded px-1">已封</span>`
    : `<button class="btn-ban-row text-[10px] bg-red-500 text-white rounded px-1 hover:bg-red-600" data-ip="${escHtml(it.ip)}">禁此IP</button>`;
  const isFeat = featuredSet.has(it.path);
  const featBtn = isFeat
    ? `<button class="btn-unfeat-row mt-1 w-full text-[10px] bg-amber-500 text-white rounded px-1 py-0.5 hover:bg-amber-600" data-path="${escHtml(it.path)}">★ 已精选 (取消)</button>`
    : `<button class="btn-feat-row mt-1 w-full text-[10px] bg-yellow-100 text-amber-700 border border-amber-300 rounded px-1 py-0.5 hover:bg-yellow-200" data-path="${escHtml(it.path)}">☆ 加入精选</button>`;
  return `<div class="border rounded p-1 bg-gray-50" data-row-path="${escHtml(it.path)}">
    <img src="/api/output/file?path=${encodeURIComponent(it.path)}" loading="lazy"
      class="lb-thumb w-full aspect-square object-cover rounded bg-white cursor-pointer"
      data-path="${escHtml(it.path)}" data-mtime="${it.mtime || ''}" data-ip="${escHtml(it.ip || '?')}" />
    <div class="text-[10px] mt-1 break-all">${escHtml(it.path)}</div>
    <div class="text-[10px] text-gray-500">${t}</div>
    <div class="flex items-center justify-between gap-1 mt-1">
      <span class="text-[10px] font-mono bg-amber-100 text-amber-800 rounded px-1 break-all">${escHtml(it.ip || '?')}</span>
      ${banBtn}
    </div>
    ${featBtn}
    <button class="btn-del-row mt-1 w-full text-[10px] bg-gray-700 text-white rounded px-1 py-0.5 hover:bg-black"
      data-path="${escHtml(it.path)}">🗑 删图</button>
  </div>`;
}

function bindRowButtons(scope) {
  scope.querySelectorAll('.btn-ban-row').forEach(b => b.addEventListener('click', () => ban(b.dataset.ip)));
  scope.querySelectorAll('.btn-del-row').forEach(b => b.addEventListener('click', () => delImage(b.dataset.path)));
  scope.querySelectorAll('.btn-feat-row').forEach(b => b.addEventListener('click', () => addFeatured(b.dataset.path)));
  scope.querySelectorAll('.btn-unfeat-row').forEach(b => b.addEventListener('click', () => removeFeatured(b.dataset.path)));
}

async function refreshFeaturedSet() {
  try {
    const d = await api('GET', '/api/admin/featured');
    featuredSet = new Set(d.items || []);
  } catch {}
}

function updateRowFeaturedUI(path) {
  const card = document.querySelector(`[data-row-path="${CSS.escape(path)}"]`);
  if (!card) return;
  const oldFeat = card.querySelector('.btn-feat-row, .btn-unfeat-row');
  if (!oldFeat) return;
  const isFeat = featuredSet.has(path);
  const html = isFeat
    ? `<button class="btn-unfeat-row mt-1 w-full text-[10px] bg-amber-500 text-white rounded px-1 py-0.5 hover:bg-amber-600" data-path="${escHtml(path)}">★ 已精选 (取消)</button>`
    : `<button class="btn-feat-row mt-1 w-full text-[10px] bg-yellow-100 text-amber-700 border border-amber-300 rounded px-1 py-0.5 hover:bg-yellow-200" data-path="${escHtml(path)}">☆ 加入精选</button>`;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const fresh = tmp.firstElementChild;
  oldFeat.replaceWith(fresh);
  bindRowButtons(card);
}

async function addFeatured(path) {
  const d = await api('POST', '/api/admin/featured/add', { path });
  featuredSet = new Set(d.items || []);
  updateRowFeaturedUI(path);
  renderFeatured(d.items || []);
}

async function removeFeatured(path) {
  const d = await api('POST', '/api/admin/featured/remove', { path });
  featuredSet = new Set(d.items || []);
  updateRowFeaturedUI(path);
  renderFeatured(d.items || []);
}

function renderFeatured(items) {
  $('featured-count').textContent = items.length;
  if (!items.length) {
    $('featured-list').innerHTML = '<div class="text-gray-400">还没添加任何精选图。在下面「生图记录」里点 ☆ 加入精选。</div>';
    return;
  }
  $('featured-list').innerHTML = '<div id="featured-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2">' +
    items.map(p => `<div class="border rounded p-1 bg-amber-50 cursor-move" draggable="true" data-feat-path="${escHtml(p)}">
      <img src="/api/output/file?path=${encodeURIComponent(p)}" loading="lazy"
        class="lb-thumb w-full aspect-square object-cover rounded bg-white cursor-pointer"
        data-path="${escHtml(p)}" data-mtime="" data-ip="" />
      <div class="text-[10px] mt-1 break-all">${escHtml(p)}</div>
      <button class="btn-unfeat-feat mt-1 w-full text-[10px] bg-amber-500 text-white rounded px-1 py-0.5 hover:bg-amber-600"
        data-path="${escHtml(p)}">移出精选</button>
    </div>`).join('') + '</div>';
  const grid = $('featured-grid');
  grid.querySelectorAll('.btn-unfeat-feat').forEach(b => b.addEventListener('click', () => removeFeatured(b.dataset.path)));
  // 拖拽排序
  let dragSrc = null;
  grid.querySelectorAll('[data-feat-path]').forEach(el => {
    el.addEventListener('dragstart', e => { dragSrc = el; el.classList.add('opacity-50'); e.dataTransfer.effectAllowed = 'move'; });
    el.addEventListener('dragend', () => { el.classList.remove('opacity-50'); dragSrc = null; });
    el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    el.addEventListener('drop', async e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === el) return;
      const rect = el.getBoundingClientRect();
      const before = (e.clientY - rect.top) < rect.height / 2;
      grid.insertBefore(dragSrc, before ? el : el.nextSibling);
      const order = Array.from(grid.querySelectorAll('[data-feat-path]')).map(x => x.dataset.featPath);
      const d = await api('POST', '/api/admin/featured/reorder', { items: order });
      featuredSet = new Set(d.items || []);
    });
  });
}

async function loadFeatured() {
  $('featured-list').textContent = '加载中...';
  try {
    const d = await api('GET', '/api/admin/featured');
    featuredSet = new Set(d.items || []);
    renderFeatured(d.items || []);
  } catch (e) { $('featured-list').textContent = '失败: ' + e.message; }
}

async function loadRecent(reset = true) {
  if (reset) {
    recentState.loaded = 0;
    $('recent-list').innerHTML = '<div class="text-gray-400">加载中...</div>';
  }
  try {
    await refreshBannedSet();
    await refreshFeaturedSet();
    const d = await api('GET', `/api/admin/recent?limit=${recentState.pageSize}&offset=${recentState.loaded}`);
    const items = d.items || [];
    recentState.total = d.total || 0;
    if (reset) {
      if (!items.length) {
        $('recent-list').innerHTML = '<div class="text-gray-400">暂无</div>';
      } else {
        $('recent-list').innerHTML = '<div id="recent-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">' +
          items.map(rowHTML).join('') + '</div>';
        bindRowButtons($('recent-grid'));
      }
    } else {
      const grid = $('recent-grid');
      if (grid && items.length) {
        const tmp = document.createElement('div');
        tmp.innerHTML = items.map(rowHTML).join('');
        const frag = document.createDocumentFragment();
        while (tmp.firstChild) frag.appendChild(tmp.firstChild);
        grid.appendChild(frag);
        bindRowButtons(grid);
      }
    }
    recentState.loaded += items.length;
    $('recent-shown').textContent = recentState.loaded;
    $('recent-total').textContent = recentState.total;
    if (recentState.loaded < recentState.total) {
      $('btn-load-more-recent').classList.remove('hidden');
    } else {
      $('btn-load-more-recent').classList.add('hidden');
    }
  } catch (e) { $('recent-list').textContent = '失败: ' + e.message; }
}

async function delImage(path) {
  await api('POST', '/api/admin/delete', { path });
  // 仅原地移除该卡片，不重载列表（避免页面跳回顶部）
  const card = document.querySelector(`[data-row-path="${CSS.escape(path)}"]`);
  if (card) card.remove();
  if (recentState.loaded > 0) recentState.loaded -= 1;
  if (recentState.total > 0) recentState.total -= 1;
  $('recent-shown').textContent = recentState.loaded;
  $('recent-total').textContent = recentState.total;
}

async function loadLimits() {
  try {
    const d = await api('GET', '/api/admin/limits');
    const L = d.limits || {};
    $('lim-gen-cd').value = L.gen_cooldown_sec ?? '';
    $('lim-img-window').value = L.image_rate_window_sec ?? '';
    $('lim-img-max').value = L.image_rate_max ?? '';
    $('lim-report-window').value = L.report_window_sec ?? '';
    $('lim-report-max').value = L.report_window_max ?? '';
    $('lim-report-pending').value = L.report_pending_max ?? '';
    $('lim-status').textContent = '';
  } catch (e) {
    $('lim-status').textContent = '加载失败: ' + e.message;
  }
}

async function saveLimits() {
  const payload = {
    gen_cooldown_sec: parseInt($('lim-gen-cd').value) || 0,
    image_rate_window_sec: parseInt($('lim-img-window').value) || 0,
    image_rate_max: parseInt($('lim-img-max').value) || 0,
    report_window_sec: parseInt($('lim-report-window').value) || 0,
    report_window_max: parseInt($('lim-report-max').value) || 1,
    report_pending_max: parseInt($('lim-report-pending').value) || 1,
  };
  try {
    await api('POST', '/api/admin/limits', payload);
    $('lim-status').textContent = '✓ 已保存';
    setTimeout(() => { $('lim-status').textContent = ''; }, 2000);
  } catch (e) {
    $('lim-status').textContent = '保存失败: ' + e.message;
  }
}

$('btn-refresh-bans').addEventListener('click', loadBans);
$('btn-refresh-recent').addEventListener('click', () => loadRecent(true));
$('btn-refresh-featured').addEventListener('click', loadFeatured);
$('btn-refresh-limits').addEventListener('click', loadLimits);
$('btn-save-limits').addEventListener('click', saveLimits);
async function loadMaintenance() {
  try {
    const d = await api('GET', '/api/admin/maintenance');
    const m = d.maintenance || {};
    const mode = m.enabled ? (m.mode || 'full') : 'off';
    document.querySelector(`input[name="maint-mode"][value="${mode}"]`).checked = true;
    $('maint-message').value = m.message || '';
    const badge = $('maint-state-badge');
    if (m.enabled && m.mode === 'no_gen') {
      badge.textContent = '仅禁止生图';
      badge.className = 'ml-2 text-xs px-2 py-0.5 rounded bg-amber-500 text-white';
    } else if (m.enabled) {
      badge.textContent = '完全维护';
      badge.className = 'ml-2 text-xs px-2 py-0.5 rounded bg-red-500 text-white';
    } else {
      badge.textContent = '未开启';
      badge.className = 'ml-2 text-xs px-2 py-0.5 rounded bg-gray-200 text-gray-700';
    }
    $('maint-status').textContent = '';
  } catch (e) { $('maint-status').textContent = '加载失败: ' + e.message; }
}

async function saveMaintenance() {
  try {
    const mode = document.querySelector('input[name="maint-mode"]:checked').value;
    const d = await api('POST', '/api/admin/maintenance', {
      enabled: mode !== 'off',
      mode: mode === 'off' ? 'full' : mode,
      message: $('maint-message').value,
    });
    const m = d.maintenance || {};
    const badge = $('maint-state-badge');
    if (m.enabled && m.mode === 'no_gen') {
      badge.textContent = '仅禁止生图';
      badge.className = 'ml-2 text-xs px-2 py-0.5 rounded bg-amber-500 text-white';
    } else if (m.enabled) {
      badge.textContent = '完全维护';
      badge.className = 'ml-2 text-xs px-2 py-0.5 rounded bg-red-500 text-white';
    } else {
      badge.textContent = '未开启';
      badge.className = 'ml-2 text-xs px-2 py-0.5 rounded bg-gray-200 text-gray-700';
    }
    $('maint-status').textContent = '✓ 已保存';
    setTimeout(() => { $('maint-status').textContent = ''; }, 2000);
  } catch (e) { $('maint-status').textContent = '保存失败: ' + e.message; }
}

$('btn-refresh-maint').addEventListener('click', loadMaintenance);
$('btn-save-maint').addEventListener('click', saveMaintenance);

loadMaintenance();
$('btn-load-more-recent').addEventListener('click', () => loadRecent(false));
$('btn-add-ban').addEventListener('click', () => ban($('ban-input').value.trim()));
$('ban-input').addEventListener('keydown', e => { if (e.key === 'Enter') ban($('ban-input').value.trim()); });

// 折叠：点击带 data-toggle 的标题，切换对应 id 的显隐 + 箭头
document.querySelectorAll('[data-toggle]').forEach(h => {
  h.addEventListener('click', e => {
    // 点到右侧的「刷新」按钮等不触发折叠
    if (e.target.closest('button')) return;
    const id = h.dataset.toggle;
    const body = document.getElementById(id);
    if (!body) return;
    const arrow = document.querySelector(`[data-arrow="${id}"]`);
    const collapsed = body.classList.toggle('hidden');
    if (arrow) arrow.textContent = collapsed ? '▸' : '▾';
  });
});

// ── 举报管理 ──
function reportCardHTML(rpt) {
  const t = rpt.timestamp ? new Date(rpt.timestamp * 1000).toLocaleString('zh-CN') : '?';
  const imgUrl = '/api/output/file?path=' + encodeURIComponent(rpt.image_path);
  const exists = rpt.image_exists !== false;
  return `<div class="border rounded p-3 bg-gray-50 flex gap-3" data-report-id="${escHtml(rpt.id)}">
    <div class="w-24 h-24 flex-shrink-0">
      ${exists
        ? `<img src="${imgUrl}" loading="lazy"
            class="lb-thumb w-full h-full object-cover rounded bg-white cursor-pointer"
            data-path="${escHtml(rpt.image_path)}" data-mtime="" data-ip="${escHtml(rpt.creator_ip || '')}" />`
        : `<div class="w-full h-full bg-gray-200 rounded flex items-center justify-center text-xs text-gray-400">已删除</div>`}
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-xs break-all text-gray-600 mb-1">${escHtml(rpt.image_path)}</div>
      <div class="text-sm mb-1"><strong>举报原因：</strong>${escHtml(rpt.reason)}</div>
      <div class="text-xs text-gray-500 mb-1">🕒 ${t}</div>
      <div class="text-xs mb-2">
        <span class="bg-amber-100 text-amber-800 rounded px-1 font-mono">绘图者: ${escHtml(rpt.creator_ip || '未知')}</span>
        <span class="bg-blue-100 text-blue-800 rounded px-1 font-mono ml-1">举报者: ${escHtml(rpt.reporter_ip)}</span>
      </div>
      <div class="flex gap-1 flex-wrap">
        <button class="rpt-action text-xs px-2 py-1 bg-gray-700 text-white rounded hover:bg-black"
          data-id="${escHtml(rpt.id)}" data-action="delete">🗑 删图</button>
        <button class="rpt-action text-xs px-2 py-1 bg-red-500 text-white rounded hover:bg-red-600"
          data-id="${escHtml(rpt.id)}" data-action="ban_creator">🚫 封禁绘图者</button>
        <button class="rpt-action text-xs px-2 py-1 bg-orange-500 text-white rounded hover:bg-orange-600"
          data-id="${escHtml(rpt.id)}" data-action="ban_reporter">🚫 封禁举报者</button>
        <button class="rpt-action text-xs px-2 py-1 bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
          data-id="${escHtml(rpt.id)}" data-action="dismiss">忽略</button>
      </div>
    </div>
  </div>`;
}

async function loadReports() {
  $('reports-list').textContent = '加载中...';
  try {
    const d = await api('GET', '/api/admin/reports');
    const reports = d.reports || [];
    $('reports-count').textContent = reports.length;
    if (!reports.length) {
      $('reports-list').innerHTML = '<div class="text-gray-400">暂无待处理举报</div>';
      return;
    }
    $('reports-list').innerHTML = '<div class="space-y-2">' +
      reports.map(reportCardHTML).join('') + '</div>';
    $('reports-list').querySelectorAll('.rpt-action').forEach(btn => {
      btn.addEventListener('click', () => resolveReport(btn.dataset.id, btn.dataset.action));
    });
  } catch (e) {
    $('reports-list').textContent = '加载失败: ' + e.message;
  }
}

async function resolveReport(reportId, action) {
  const labels = {delete: '删图', ban_creator: '封禁绘图者', ban_reporter: '封禁举报者', dismiss: '忽略'};
  if (!confirm(`确认执行「${labels[action] || action}」？`)) return;
  try {
    await api('POST', '/api/admin/report/resolve', {report_id: reportId, action});
    const card = $('reports-list').querySelector(`[data-report-id="${CSS.escape(reportId)}"]`);
    if (card) card.remove();
    const count = parseInt($('reports-count').textContent) || 0;
    $('reports-count').textContent = Math.max(0, count - 1);
    if (!$('reports-list').querySelector('[data-report-id]')) {
      $('reports-list').innerHTML = '<div class="text-gray-400">暂无待处理举报</div>';
    }
    if (action === 'ban_creator' || action === 'ban_reporter') loadBans();
    if (action === 'delete') loadRecent(true);
  } catch (e) {
    alert('操作失败: ' + e.message);
  }
}

$('btn-refresh-reports').addEventListener('click', loadReports);

// ── IP 图片查看 ──
let ipImagesSelected = new Set();

async function showIpImages(ip) {
  const panel = $('ip-images-panel');
  const grid = $('ip-images-grid');
  $('ip-images-title').textContent = ip;
  grid.innerHTML = '<div class="col-span-full text-gray-400">加载中...</div>';
  panel.classList.remove('hidden');
  ipImagesSelected.clear();
  updateIpDelBtn();
  try {
    const d = await api('GET', '/api/admin/images_by_ip?ip=' + encodeURIComponent(ip));
    const items = d.items || [];
    $('ip-images-count').textContent = items.length;
    if (!items.length) {
      grid.innerHTML = '<div class="col-span-full text-gray-400">该 IP 没有关联的图片记录</div>';
      return;
    }
    grid.innerHTML = items.map(it => {
      const t = it.mtime ? new Date(it.mtime * 1000).toLocaleString('zh-CN') : '?';
      return `<div class="border rounded p-1 bg-gray-50 relative" data-ip-img-path="${escHtml(it.path)}">
        <div class="absolute top-2 left-2 z-10">
          <input type="checkbox" class="ip-img-check w-4 h-4 cursor-pointer" data-path="${escHtml(it.path)}" />
        </div>
        <img src="/api/output/file?path=${encodeURIComponent(it.path)}" loading="lazy"
          class="lb-thumb w-full aspect-square object-cover rounded bg-white cursor-pointer"
          data-path="${escHtml(it.path)}" data-mtime="${it.mtime || ''}" data-ip="${escHtml(ip)}" />
        <div class="text-[10px] mt-1 break-all">${escHtml(it.path)}</div>
        <div class="text-[10px] text-gray-500">${t}</div>
      </div>`;
    }).join('');
    grid.querySelectorAll('.ip-img-check').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) ipImagesSelected.add(cb.dataset.path);
        else ipImagesSelected.delete(cb.dataset.path);
        updateIpDelBtn();
      });
    });
  } catch (e) {
    grid.innerHTML = `<div class="col-span-full text-red-500">加载失败: ${escHtml(e.message)}</div>`;
  }
}

function updateIpDelBtn() {
  const btn = $('btn-ip-del-selected');
  if (ipImagesSelected.size > 0) {
    btn.classList.remove('hidden');
    btn.textContent = `🗑 删除选中 (${ipImagesSelected.size})`;
  } else {
    btn.classList.add('hidden');
  }
}

$('btn-ip-select-all').addEventListener('click', () => {
  const checks = $('ip-images-grid').querySelectorAll('.ip-img-check');
  const allChecked = Array.from(checks).every(c => c.checked);
  checks.forEach(c => {
    c.checked = !allChecked;
    if (c.checked) ipImagesSelected.add(c.dataset.path);
    else ipImagesSelected.delete(c.dataset.path);
  });
  updateIpDelBtn();
});

$('btn-ip-del-selected').addEventListener('click', async () => {
  if (!ipImagesSelected.size) return;
  if (!confirm(`确定删除选中的 ${ipImagesSelected.size} 张图片？此操作不可撤销。`)) return;
  const paths = Array.from(ipImagesSelected);
  try {
    await api('POST', '/api/admin/delete_batch', { paths });
    paths.forEach(p => {
      const card = $('ip-images-grid').querySelector(`[data-ip-img-path="${CSS.escape(p)}"]`);
      if (card) card.remove();
      const rowCard = document.querySelector(`[data-row-path="${CSS.escape(p)}"]`);
      if (rowCard) rowCard.remove();
    });
    ipImagesSelected.clear();
    updateIpDelBtn();
    const remaining = $('ip-images-grid').querySelectorAll('[data-ip-img-path]').length;
    $('ip-images-count').textContent = remaining;
    if (!remaining) {
      $('ip-images-grid').innerHTML = '<div class="col-span-full text-gray-400">已全部删除</div>';
    }
  } catch (e) { alert('删除失败: ' + e.message); }
});

$('btn-ip-images-close').addEventListener('click', () => {
  $('ip-images-panel').classList.add('hidden');
  ipImagesSelected.clear();
});

// ── 灯箱 ──
const lbState = { items: [], index: 0 };

function collectLightboxItems() {
  const imgs = document.querySelectorAll('.lb-thumb');
  return Array.from(imgs).map(img => ({
    url: img.src,
    path: img.dataset.path || '',
    mtime: img.dataset.mtime || '',
    ip: img.dataset.ip || '',
  }));
}

function showLightbox() {
  const it = lbState.items[lbState.index];
  if (!it) return;
  $('lb-img').src = it.url;
  const name = it.path.split('/').pop() || it.path;
  $('lb-title').textContent = name;
  $('lb-time').textContent = it.mtime ? new Date(it.mtime * 1000).toLocaleString('zh-CN') : '';
  $('lb-creator').textContent = it.ip ? ('IP: ' + it.ip) : '';
  $('lb-download').href = it.url + (it.url.includes('?') ? '&' : '?') + 'full=1';
  $('lb-root').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  $('lb-root').classList.remove('open');
  $('lb-img').src = '';
  document.body.style.overflow = '';
}

document.addEventListener('click', (e) => {
  const img = e.target.closest('.lb-thumb');
  if (!img) return;
  if (e.target.closest('button') || e.target.closest('.btn-del-row') || e.target.closest('.btn-ban-row')) return;
  e.preventDefault();
  e.stopPropagation();
  lbState.items = collectLightboxItems();
  const url = img.src;
  lbState.index = Math.max(0, lbState.items.findIndex(it => it.url === url));
  showLightbox();
});

$('lb-close').addEventListener('click', closeLightbox);
$('lb-prev').addEventListener('click', () => { lbState.index = (lbState.index - 1 + lbState.items.length) % lbState.items.length; showLightbox(); });
$('lb-next').addEventListener('click', () => { lbState.index = (lbState.index + 1) % lbState.items.length; showLightbox(); });

$('lb-img-wrap').addEventListener('click', (e) => { if (e.target === $('lb-img-wrap')) closeLightbox(); });
$('lb-root').addEventListener('click', (e) => { if (e.target === $('lb-root')) closeLightbox(); });

document.addEventListener('keydown', (e) => {
  if (!$('lb-root').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbState.index = (lbState.index - 1 + lbState.items.length) % lbState.items.length; showLightbox(); }
  if (e.key === 'ArrowRight') { lbState.index = (lbState.index + 1) % lbState.items.length; showLightbox(); }
});

loadLimits();
loadBans();
loadReports();
loadFeatured();
loadRecent(true);
</script>
