<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>站点维护中</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #374151; padding: 24px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); max-width: 560px; width: 100%; padding: 40px 32px; text-align: center; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #111827; }
  .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
  .msg { text-align: left; font-size: 14px; line-height: 1.7; color: #374151; }
  .msg h1, .msg h2, .msg h3 { margin: 16px 0 8px; font-weight: 600; color: #111827; }
  .msg h1 { font-size: 20px; } .msg h2 { font-size: 17px; } .msg h3 { font-size: 15px; }
  .msg p { margin: 8px 0; }
  .msg ul, .msg ol { margin: 8px 0 8px 24px; }
  .msg li { margin: 4px 0; }
  .msg code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .msg pre { background: #1f2937; color: #e5e7eb; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  .msg pre code { background: none; color: inherit; padding: 0; }
  .msg a { color: #3b82f6; text-decoration: underline; }
  .msg blockquote { border-left: 3px solid #d1d5db; padding-left: 12px; color: #6b7280; margin: 8px 0; }
  .msg img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
  .msg hr { border: none; border-top: 1px solid #e5e7eb; margin: 16px 0; }
  .footer { margin-top: 32px; font-size: 12px; color: #9ca3af; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>
  <h1>站点维护中</h1>
  <p class="subtitle">我们正在进行维护，请稍后再来</p>
  <div class="msg" id="msg"></div>
</div>
<script>
  const raw = `{{MESSAGE}}`;
  const el = document.getElementById('msg');
  if (raw.trim()) {
    el.innerHTML = marked.parse(raw);
  } else {
    el.parentElement.removeChild(el);
    document.querySelector('.subtitle').textContent = '系统正在升级维护中，请稍后再来访问。';
  }
</script>
</body>
</html>
